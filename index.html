<form id="resident-form" class="p-8 space-y-4">
    <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
            <label class="filter-label">Full Name</label>
            <input type="text" id="form-name" required class="filter-input w-full">
        </div>
        <div class="col-span-2">
            <label class="filter-label">Email Address</label>
            <input type="email" id="form-email" required class="filter-input w-full">
        </div>
        <div>
            <label class="filter-label">Gender</label>
            <select id="form-gender" class="filter-input w-full">
                <option value="MALE">MALE</option>
                <option value="FEMALE">FEMALE</option>
            </select>
        </div>
        <div>
            <label class="filter-label">Birth Date</label>
            <input type="date" id="form-dob" required class="filter-input w-full">
        </div>
        <div>
            <label class="filter-label">Civil Status</label>
            <select id="form-status" class="filter-input w-full">
                <option value="SINGLE">SINGLE</option>
                <option value="MARRIED">MARRIED</option>
                <option value="WIDOWED">WIDOWED</option>
            </select>
        </div>
        <div>
            <label class="filter-label">Occupation</label>
            <input type="text" id="form-occupation" required class="filter-input w-full">
        </div>
        <div>
            <label class="filter-label">Voter Status</label>
            <select id="form-voter" class="filter-input w-full">
                <option value="REGISTERED">REGISTERED</option>
                <option value="NOT REGISTERED">NOT REGISTERED</option>
            </select>
        </div>
        <div>
            <label class="filter-label">Contact Number</label>
            <input type="text" id="form-contact" required class="filter-input w-full">
        </div>
        <div>
            <label class="filter-label">Barangay</label>
            <input type="text" id="form-barangay" required class="filter-input w-full">
        </div>
        <div>
            <label class="filter-label">Purok</label>
            <input type="text" id="form-purok" required class="filter-input w-full">
        </div>
        <div class="col-span-2">
            <label class="filter-label">Street</label>
            <input type="text" id="form-street" required class="filter-input w-full">
        </div>
    </div>
    <div class="flex justify-end gap-3 pt-6">
        <button type="button" onclick="closeModal()" class="px-6 py-2 text-slate-500 font-semibold">Cancel</button>
        <button type="submit" class="btn-primary">Save Resident</button>
    </div>
</form>
